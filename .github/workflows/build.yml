name: Build All TedPermission Modules to Single DEX

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-all-dex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build All Modules
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Merge All Jars and Convert to DEX
        run: |
          # 1. Buat folder sementara untuk extract
          mkdir combined_jar
          
          # 2. Cari semua file AAR dari semua folder modul (normal, coroutine, rx, dll)
          # Lalu extract classes.jar dari masing-masing AAR dan kumpulkan
          count=0
          find . -name "*release.aar" | while read aar; do
            count=$((count+1))
            unzip -p "$aar" classes.jar > "combined_jar/part_$count.jar"
            echo "Extracted classes.jar from $aar"
          done
          
          # 3. Cari lokasi D8
          D8_PATH=$(find $ANDROID_HOME/build-tools -name "d8" | sort -r | head -n 1)
          
          # 4. Jalankan D8 dengan menginput SEMUA jar yang sudah dikumpulkan
          # Ini akan menggabungkan semuanya menjadi satu classes.dex
          $D8_PATH --release --output combined_dex.zip combined_jar/*.jar
          
          # 5. Extract hasil akhirnya
          unzip combined_dex.zip classes.dex

      - name: Upload Single DEX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TedPermission-Full-DEX
          path: classes.dex
          
