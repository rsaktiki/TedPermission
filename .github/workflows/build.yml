name: Build TedPermission Core and Normal to Single DEX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-dex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Modules
        run: |
          chmod +x gradlew
          ./gradlew :tedpermission:assembleRelease :tedpermission-normal:assembleRelease

      - name: Merge and Convert to DEX
        run: |
          mkdir temp_jars
          
          # Ambil classes.jar dari modul Core
          unzip -p tedpermission/build/outputs/aar/tedpermission-release.aar classes.jar > temp_jars/core.jar
          
          # Ambil classes.jar dari modul Normal
          unzip -p tedpermission-normal/build/outputs/aar/tedpermission-normal-release.aar classes.jar > temp_jars/normal.jar
          
          # Cari D8
          D8_PATH=$(find $ANDROID_HOME/build-tools -name "d8" | sort -r | head -n 1)
          
          # Gabungkan keduanya jadi satu classes.dex
          $D8_PATH --release --output merged_dex.zip temp_jars/core.jar temp_jars/normal.jar
          
          # Extract hasil akhirnya
          unzip merged_dex.zip classes.dex

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TedPermission-Normal-Full-DEX
          path: classes.dex
          
